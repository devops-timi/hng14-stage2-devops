name: Lint, Test, Build, and Security Scan, Integration Test Multi-service application
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8  

      - name: Lint Python(api)
        run: |
          flake8 api/main.py --max-line-length=100

      - name: Lint Python(worker)
        run: |
          flake8 worker/worker.py --max-line-length=100

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install ESLint
        run: |
          npm install -g eslint

      - name: Lint JavaScript(frontend)
        run: eslint frontend/app.js

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint --ignore DL3008 api/Dockerfile
          hadolint frontend/Dockerfile
          hadolint worker/Dockerfile

  test:
    name: Run Tests
    runs-on: ubuntu-latest 
    needs: lint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov httpx
          pip install -r api/requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/test_api.py -v --cov=api --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test          # only runs if test passes
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000    # local registry running as service container

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest

      - name: Build and push api
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
  
  security-scan:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push images to local registry
        run: |
          docker build -t localhost:5000/frontend:latest ./frontend
          docker build -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:latest ./worker
          docker push localhost:5000/frontend:latest
          docker push localhost:5000/api:latest
          docker push localhost:5000/worker:latest

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan frontend image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --format sarif \
            --output trivy-frontend.sarif \
            localhost:5000/frontend:latest

      - name: Scan api image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --format sarif \
            --output trivy-api.sarif \
            localhost:5000/api:latest

      - name: Scan worker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --format sarif \
            --output trivy-worker.sarif \
            localhost:5000/worker:latest

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start full stack
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          APP_ENV: ${{ secrets.APP_ENV }}
        run: docker compose up -d --build

      - name: Wait for all services to be healthy
        run: |
          timeout 120 bash -c '
            until \
              docker compose ps | grep "redis" | grep -q "healthy" && \
              docker compose ps | grep "api" | grep -q "healthy" && \
              docker compose ps | grep "frontend" | grep -q "healthy"; do
              echo "Waiting for services..."
              docker compose ps
              sleep 5
            done
          '
          echo "All services healthy"

      - name: Submit a job through frontend
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:3000/submit | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Submitted job: $JOB_ID"
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll until job completes
        run: |
          timeout 60 bash -c '
            while true; do
              STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | \
                python3 -c "import sys,json; print(json.load(sys.stdin)[\"status\"])")
              echo "Current status: $STATUS"
              if [ "$STATUS" = "completed" ]; then
                break
              fi
              sleep 2
            done
          '

      - name: Assert final status is completed
        run: |
          STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          if [ "$STATUS" != "completed" ]; then
            echo "FAILED: expected completed, got $STATUS"
            exit 1
          fi
          echo "PASSED: job status is $STATUS"

      - name: Tear down stack
        if: always()
        run: docker compose down -v