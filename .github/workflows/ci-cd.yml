name: Deploy Containerized App with Nginx
on:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8  

      - name: Lint Python(api)
        run: flake8 api/main.py worker/main.py --max-line-length=100 

      - name: Lint Python(worker)
        run: flake8 worker/worker.py --max-line-length=100

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install ESLint
        run: npm install -g eslint

       - name: Create ESLint config
       - run: |
          cat > .eslintrc.json << 'EOF'
          {
            "env": { "node": true, "es2021": true },
            "rules": {
              "no-unused-vars": "warn",
              "no-undef": "error"
            }
          }
          EOF

      - name: Lint JavaScript(frontend)
      - run: eslint frontend/app.js

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint frontend/Dockerfile
          hadolint worker/Dockerfile

  test:
    name: Run Tests
    runs-on: ubuntu-latest 
    needs: lint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r api/requirements.txt

      - name: Run API Tests
        run: pytest api/tests.py

      - name: Run Worker Tests
        run: pytest worker/tests.py

  