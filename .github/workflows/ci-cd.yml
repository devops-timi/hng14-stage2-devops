name: Lint, Test, Build, and Security Scan, Integration Test Multi-service application
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8  

      - name: Lint Python(api)
        run: |
          flake8 api/main.py --max-line-length=100

      - name: Lint Python(worker)
        run: |
          flake8 worker/worker.py --max-line-length=100

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install ESLint
        run: |
          npm install -g eslint

      - name: Lint JavaScript(frontend)
        run: eslint frontend/app.js

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint --ignore DL3008 api/Dockerfile
          hadolint frontend/Dockerfile
          hadolint worker/Dockerfile

  test:
    name: Run Tests
    runs-on: ubuntu-latest 
    needs: lint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov httpx
          pip install -r api/requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/test_api.py -v --cov=api --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test          # only runs if test passes
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000    # local registry running as service container

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest

      - name: Build and push api
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
  
  security-scan:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push images to local registry
        run: |
          docker build -t localhost:5000/frontend:latest ./frontend
          docker build -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:latest ./worker
          docker push localhost:5000/frontend:latest
          docker push localhost:5000/api:latest
          docker push localhost:5000/worker:latest

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan frontend image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --format sarif \
            --output trivy-frontend.sarif \
            localhost:5000/frontend:latest

      - name: Scan api image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --format sarif \
            --output trivy-api.sarif \
            localhost:5000/api:latest

      - name: Scan worker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --format sarif \
            --output trivy-worker.sarif \
            localhost:5000/worker:latest

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start full stack
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          APP_ENV: ${{ secrets.APP_ENV }}
        run: docker compose up -d --build

      - name: Run integration test
        run: |
          chmod +x integration.sh
          ./integration.sh

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with rolling update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/hng14-stage2-devops

            git pull origin main

            rolling_update() {
              SERVICE=$1
              echo "Starting rolling update for $SERVICE"

              # Build new image
              docker compose build $SERVICE

              # Start new container
              docker compose up -d --no-deps $SERVICE

              # Wait up to 60 seconds for health check to pass
              SECONDS=0
              until docker compose ps $SERVICE | grep -q "healthy"; do
                if [ $SECONDS -ge 60 ]; then
                  echo "Health check failed for $SERVICE after 60s — aborting, old container kept"
                  exit 1
                fi
                echo "Waiting for $SERVICE to be healthy... ($SECONDS s)"
                sleep 3
              done

              echo "$SERVICE is healthy"
            }

            # Update in dependency order
            rolling_update redis
            rolling_update api
            rolling_update worker
            rolling_update frontend

            echo "Deploy complete"