name: Deploy Containerized App with Nginx
on:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8  

      - name: Lint Python(api)
        run: |
          flake8 api/main.py --max-line-length=100 
          flake8 api/tests.py --max-line-length=100

      - name: Lint Python(worker)
        run: |
          flake8 worker/worker.py --max-line-length=100
          flake8 worker/tests.py --max-line-length=100

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install ESLint
        run: |
          npm install -g eslint

      - name: Lint JavaScript(frontend)
        run: eslint frontend/app.js

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint frontend/Dockerfile
          hadolint worker/Dockerfile

  test:
    name: Run Tests
    runs-on: ubuntu-latest 
    needs: lint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov httpx
          pip install -r api/requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/test_api.py -v --cov=api --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  